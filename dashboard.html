<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reel Data — Netflix Catalog Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
  :root{
    --void:#0b0b0c;
    --panel:#151517;
    --card:#1b1b1e;
    --card-border:#28282b;
    --red:#d6162b;
    --red-dim:#8a1420;
    --warm:#f2f0ea;
    --muted:#8b8b90;
    --gold:#c9a24b;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--void); color:var(--warm);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  ::selection{background:var(--red); color:var(--warm);}

  /* ---------- Sprocket perforation divider ---------- */
  .sprockets{
    height:14px;
    background-image: radial-gradient(circle, var(--void) 3.5px, transparent 3.6px);
    background-size: 22px 14px;
    background-position: 11px center;
    background-color: var(--card-border);
  }

  /* ---------- Header ---------- */
  header{ background:var(--panel); }
  .header-inner{
    max-width:1200px; margin:0 auto; padding:28px 24px 22px;
    display:flex; align-items:flex-end; justify-content:space-between; flex-wrap:wrap; gap:16px;
  }
  .logo{
    font-family:'Bebas Neue',sans-serif;
    font-size:42px; letter-spacing:2px; line-height:1;
    color:var(--warm);
  }
  .logo span{ color:var(--red); }
  .tagline{ font-size:12.5px; color:var(--muted); margin-top:4px; letter-spacing:0.4px; }
  .stat-strip{ display:flex; gap:28px; }
  .stat{ text-align:right; }
  .stat .num{ font-family:'IBM Plex Mono',monospace; font-size:22px; color:var(--gold); }
  .stat .lbl{ font-size:10.5px; color:var(--muted); letter-spacing:1px; text-transform:uppercase; }

  /* ---------- Controls ---------- */
  .controls{
    max-width:1200px; margin:26px auto 0; padding:0 24px;
    display:flex; gap:12px; flex-wrap:wrap; align-items:center;
  }
  .search-wrap{
    flex:1 1 260px; position:relative;
  }
  .search-wrap input{
    width:100%; background:var(--card); border:1px solid var(--card-border);
    color:var(--warm); padding:12px 16px 12px 40px; border-radius:3px;
    font-family:'Inter',sans-serif; font-size:14.5px; outline:none;
  }
  .search-wrap input:focus{ border-color:var(--red); }
  .search-wrap::before{
    content:"⌕"; position:absolute; left:14px; top:50%; transform:translateY(-50%);
    color:var(--muted); font-size:17px;
  }
  select{
    background:var(--card); border:1px solid var(--card-border); color:var(--warm);
    padding:12px 14px; border-radius:3px; font-family:'Inter',sans-serif; font-size:13.5px;
    outline:none; cursor:pointer;
  }
  select:focus{ border-color:var(--red); }

  .results-meta{
    max-width:1200px; margin:16px auto 0; padding:0 24px;
    font-size:12.5px; color:var(--muted); font-family:'IBM Plex Mono',monospace;
  }

  /* ---------- Grid ---------- */
  .grid{
    max-width:1200px; margin:14px auto 60px; padding:0 24px;
    display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:16px;
  }
  .title-card{
    background:var(--card); border:1px solid var(--card-border); border-radius:4px;
    padding:16px; cursor:pointer; position:relative; overflow:hidden;
    transition:border-color .15s ease, transform .15s ease;
  }
  .title-card:hover{ border-color:var(--red); transform:translateY(-2px); }
  .title-card:focus-visible{ outline:2px solid var(--red); outline-offset:2px; }
  .badge-type{
    display:inline-block; font-size:10px; letter-spacing:1px; text-transform:uppercase;
    padding:2px 7px; border-radius:2px; margin-bottom:10px; font-weight:600;
  }
  .badge-type.movie{ background:rgba(214,22,43,0.18); color:#ff5c6c; }
  .badge-type.tv{ background:rgba(201,162,75,0.18); color:var(--gold); }
  .card-title{
    font-family:'Bebas Neue',sans-serif; font-size:21px; letter-spacing:0.5px;
    line-height:1.15; margin-bottom:8px; color:var(--warm);
  }
  .card-genres{ font-size:11.5px; color:var(--muted); margin-bottom:14px; min-height:16px; }
  .card-footer{
    display:flex; justify-content:space-between; align-items:center;
    font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:var(--muted);
    border-top:1px dashed var(--card-border); padding-top:10px;
  }
  .card-footer .rating{ color:var(--gold); }
  .no-results{
    grid-column:1/-1; text-align:center; padding:60px 20px; color:var(--muted);
  }
  .no-results .big{ font-family:'Bebas Neue',sans-serif; font-size:28px; color:var(--warm); display:block; margin-bottom:6px;}

  /* ---------- Stats section ---------- */
  .stats-section{ background:var(--panel); padding:50px 24px 60px; }
  .stats-inner{ max-width:1200px; margin:0 auto; }
  .section-eyebrow{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:2px;
    color:var(--red); text-transform:uppercase; margin-bottom:6px;
  }
  .section-heading{
    font-family:'Bebas Neue',sans-serif; font-size:30px; letter-spacing:0.5px; margin-bottom:28px;
  }
  .charts-grid{ display:grid; grid-template-columns:1.3fr 1fr; gap:20px; }
  @media(max-width:800px){ .charts-grid{ grid-template-columns:1fr; } }
  .chart-card{
    background:var(--card); border:1px solid var(--card-border); border-radius:4px; padding:20px;
  }
  .chart-card h3{
    font-family:'Inter',sans-serif; font-size:13.5px; font-weight:600; color:var(--muted);
    text-transform:uppercase; letter-spacing:0.8px; margin:0 0 14px;
  }
  .chart-wrap{ height:280px; }

  /* ---------- Detail modal (clapperboard motif) ---------- */
  .overlay{
    position:fixed; inset:0; background:rgba(0,0,0,0.72);
    display:none; align-items:center; justify-content:center; z-index:50; padding:20px;
  }
  .overlay.open{ display:flex; }
  .modal{
    background:var(--panel); border-radius:6px; max-width:720px; width:100%;
    max-height:88vh; overflow-y:auto; position:relative;
    border:1px solid var(--card-border);
  }
  .clap-bar{
    height:22px;
    background: repeating-linear-gradient(-45deg, var(--warm) 0 18px, var(--void) 18px 36px);
    border-radius:6px 6px 0 0;
    position:relative;
  }
  .clap-bar::after{
    content:""; position:absolute; inset:0;
    background: linear-gradient(90deg, rgba(214,22,43,0.35), transparent 40%);
  }
  .modal-close{
    position:absolute; top:30px; right:16px; background:var(--card);
    border:1px solid var(--card-border); color:var(--warm); width:32px; height:32px;
    border-radius:50%; cursor:pointer; font-size:16px; line-height:1; z-index:2;
  }
  .modal-close:hover{ border-color:var(--red); }
  .modal-body{ padding:28px 32px 32px; }
  .slate-row{
    display:flex; gap:24px; font-family:'IBM Plex Mono',monospace; font-size:11.5px;
    color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-bottom:14px;
  }
  .slate-row b{ color:var(--warm); }
  .modal-title{
    font-family:'Bebas Neue',sans-serif; font-size:36px; letter-spacing:0.5px; line-height:1.05;
    margin:0 0 14px;
  }
  .modal-desc{ font-size:14.5px; line-height:1.65; color:#d5d3cd; margin-bottom:22px; }
  .modal-meta{
    display:grid; grid-template-columns:1fr 1fr; gap:10px 24px; font-size:13px;
    margin-bottom:26px; padding-bottom:22px; border-bottom:1px dashed var(--card-border);
  }
  .modal-meta div b{ color:var(--muted); font-weight:600; display:block; font-size:11px; text-transform:uppercase; letter-spacing:0.6px; margin-bottom:3px;}
  .recs-heading{
    font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:1.5px;
    color:var(--red); text-transform:uppercase; margin-bottom:12px;
  }
  .recs-list{ display:flex; flex-direction:column; gap:2px; }
  .rec-item{
    display:flex; justify-content:space-between; padding:10px 12px; border-radius:3px;
    cursor:pointer; font-size:14px;
  }
  .rec-item:hover{ background:var(--card); }
  .rec-item .rec-genre{ color:var(--muted); font-size:12px; }

  a, button{ font-family:inherit; }
  @media (prefers-reduced-motion: reduce){
    .title-card{ transition:none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo">REEL<span>DATA</span></div>
      <div class="tagline">A content-based lens on the Netflix catalog</div>
    </div>
    <div class="stat-strip" id="statStrip"></div>
  </div>
</header>
<div class="sprockets"></div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="searchInput" placeholder="Search titles, cast, or description…">
  </div>
  <select id="typeFilter">
    <option value="">All Types</option>
    <option value="Movie">Movies</option>
    <option value="TV Show">TV Shows</option>
  </select>
  <select id="genreFilter"><option value="">All Genres</option></select>
  <select id="countryFilter"><option value="">All Countries</option></select>
  <select id="sortBy">
    <option value="year_desc">Newest First</option>
    <option value="year_asc">Oldest First</option>
    <option value="title_asc">Title A–Z</option>
  </select>
</div>

<div class="results-meta" id="resultsMeta"></div>
<div class="grid" id="grid"></div>

<section class="stats-section">
  <div class="stats-inner">
    <div class="section-eyebrow">Catalog Trends</div>
    <div class="section-heading">The shape of the library</div>
    <div class="charts-grid">
      <div class="chart-card">
        <h3>Titles Added by Year</h3>
        <div class="chart-wrap"><canvas id="yearChart"></canvas></div>
      </div>
      <div class="chart-card">
        <h3>Top Genres</h3>
        <div class="chart-wrap"><canvas id="genreChart"></canvas></div>
      </div>
    </div>
  </div>
</section>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="clap-bar"></div>
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
const DATA = JSON.parse(document.getElementById('data-payload').textContent);
const byId = {};
DATA.forEach(d => byId[d.title] = d);

// ---------- Header stats ----------
const totalTitles = DATA.length;
const movies = DATA.filter(d => d.type === 'Movie').length;
const tv = DATA.length - movies;
const countries = new Set(DATA.map(d => d.country)).size;
document.getElementById('statStrip').innerHTML = `
  <div class="stat"><div class="num">${totalTitles}</div><div class="lbl">Titles</div></div>
  <div class="stat"><div class="num">${movies}/${tv}</div><div class="lbl">Movies / TV</div></div>
  <div class="stat"><div class="num">${countries}</div><div class="lbl">Countries</div></div>
`;

// ---------- Populate filters ----------
const genreSet = new Set();
const countrySet = new Set();
DATA.forEach(d => {
  d.genres.split(',').map(g => g.trim()).forEach(g => genreSet.add(g));
  countrySet.add(d.country);
});
const genreFilter = document.getElementById('genreFilter');
[...genreSet].sort().forEach(g => {
  const o = document.createElement('option'); o.value = g; o.textContent = g;
  genreFilter.appendChild(o);
});
const countryFilter = document.getElementById('countryFilter');
[...countrySet].sort().forEach(c => {
  const o = document.createElement('option'); o.value = c; o.textContent = c;
  countryFilter.appendChild(o);
});

// ---------- Rendering ----------
const grid = document.getElementById('grid');
const resultsMeta = document.getElementById('resultsMeta');

function cardHTML(d){
  const typeClass = d.type === 'Movie' ? 'movie' : 'tv';
  return `
    <div class="title-card" tabindex="0" data-title="${encodeURIComponent(d.title)}">
      <span class="badge-type ${typeClass}">${d.type}</span>
      <div class="card-title">${d.title}</div>
      <div class="card-genres">${d.genres}</div>
      <div class="card-footer">
        <span>${d.release_year}</span>
        <span class="rating">${d.rating}</span>
        <span>${d.duration}</span>
      </div>
    </div>
  `;
}

function applyFiltersAndRender(){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const genre = genreFilter.value;
  const country = countryFilter.value;
  const sort = document.getElementById('sortBy').value;

  let filtered = DATA.filter(d => {
    if (type && d.type !== type) return false;
    if (genre && !d.genres.split(',').map(g=>g.trim()).includes(genre)) return false;
    if (country && d.country !== country) return false;
    if (q){
      const hay = (d.title + ' ' + d.cast + ' ' + d.description + ' ' + d.director).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  filtered.sort((a,b) => {
    if (sort === 'year_desc') return b.release_year - a.release_year;
    if (sort === 'year_asc') return a.release_year - b.release_year;
    if (sort === 'title_asc') return a.title.localeCompare(b.title);
    return 0;
  });

  resultsMeta.textContent = `${filtered.length} title${filtered.length===1?'':'s'} in view`;

  if (filtered.length === 0){
    grid.innerHTML = `<div class="no-results"><span class="big">No matches</span>Try a different search or clear a filter.</div>`;
    return;
  }
  // cap render for performance
  grid.innerHTML = filtered.slice(0, 120).map(cardHTML).join('');
}

grid.addEventListener('click', e => {
  const card = e.target.closest('.title-card');
  if (card) openModal(decodeURIComponent(card.dataset.title));
});
grid.addEventListener('keypress', e => {
  if (e.key === 'Enter'){
    const card = e.target.closest('.title-card');
    if (card) openModal(decodeURIComponent(card.dataset.title));
  }
});

document.getElementById('searchInput').addEventListener('input', applyFiltersAndRender);
document.getElementById('typeFilter').addEventListener('change', applyFiltersAndRender);
genreFilter.addEventListener('change', applyFiltersAndRender);
countryFilter.addEventListener('change', applyFiltersAndRender);
document.getElementById('sortBy').addEventListener('change', applyFiltersAndRender);

// ---------- Modal ----------
const overlay = document.getElementById('overlay');
const modalBody = document.getElementById('modalBody');

function openModal(title){
  const d = byId[title];
  if (!d) return;
  const recs = (d.recommendations || []).map(rt => {
    const rd = byId[rt];
    if (!rd) return '';
    return `<div class="rec-item" data-title="${encodeURIComponent(rt)}">
      <span>${rt}</span><span class="rec-genre">${rd.genres.split(',')[0].trim()}</span>
    </div>`;
  }).join('');

  modalBody.innerHTML = `
    <div class="slate-row">
      <span>PROD <b>${d.type.toUpperCase()}</b></span>
      <span>YEAR <b>${d.release_year}</b></span>
      <span>RATING <b>${d.rating}</b></span>
      <span>RUNTIME <b>${d.duration}</b></span>
    </div>
    <h2 class="modal-title">${d.title}</h2>
    <p class="modal-desc">${d.description}</p>
    <div class="modal-meta">
      <div><b>Director</b>${d.director}</div>
      <div><b>Country</b>${d.country}</div>
      <div><b>Genres</b>${d.genres}</div>
      <div><b>Cast</b>${d.cast}</div>
    </div>
    <div class="recs-heading">You might also like</div>
    <div class="recs-list">${recs || '<div class="rec-item"><span>No close matches found</span></div>'}</div>
  `;
  overlay.classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => overlay.classList.remove('open'));
overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });
document.addEventListener('keydown', e => { if (e.key === 'Escape') overlay.classList.remove('open'); });
modalBody.addEventListener('click', e => {
  const item = e.target.closest('.rec-item');
  if (item && item.dataset.title) openModal(decodeURIComponent(item.dataset.title));
});

// ---------- Charts ----------
const yearCounts = {};
DATA.forEach(d => { yearCounts[d.release_year] = (yearCounts[d.release_year]||0)+1; });
const years = Object.keys(yearCounts).map(Number).sort((a,b)=>a-b);

new Chart(document.getElementById('yearChart'), {
  type: 'bar',
  data: {
    labels: years,
    datasets: [{
      data: years.map(y => yearCounts[y]),
      backgroundColor: '#d6162b',
      borderRadius: 2,
      barThickness: 6,
    }]
  },
  options: {
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false} },
    scales:{
      x:{ ticks:{ color:'#8b8b90', maxTicksLimit:12, font:{family:'IBM Plex Mono',size:10} }, grid:{display:false} },
      y:{ ticks:{ color:'#8b8b90', font:{family:'IBM Plex Mono',size:10} }, grid:{color:'#28282b'} }
    }
  }
});

const genreCounts = {};
DATA.forEach(d => d.genres.split(',').map(g=>g.trim()).forEach(g => genreCounts[g]=(genreCounts[g]||0)+1));
const topGenres = Object.entries(genreCounts).sort((a,b)=>b[1]-a[1]).slice(0,10);

new Chart(document.getElementById('genreChart'), {
  type: 'bar',
  data: {
    labels: topGenres.map(g=>g[0]),
    datasets: [{
      data: topGenres.map(g=>g[1]),
      backgroundColor: '#c9a24b',
      borderRadius: 2,
    }]
  },
  options: {
    indexAxis:'y',
    responsive:true, maintainAspectRatio:false,
    plugins:{ legend:{display:false} },
    scales:{
      x:{ ticks:{ color:'#8b8b90', font:{family:'IBM Plex Mono',size:10} }, grid:{color:'#28282b'} },
      y:{ ticks:{ color:'#8b8b90', font:{family:'Inter',size:11} }, grid:{display:false} }
    }
  }
});

applyFiltersAndRender();
</script>
</body>
</html>
